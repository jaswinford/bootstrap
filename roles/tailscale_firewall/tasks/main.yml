---
- name: Set default incoming policy to deny
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set default outgoing policy to allow
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow inbound traffic on loopback interface
  community.general.ufw:
    rule: allow
    direction: in
    interface: lo

- name: Allow Tailscale WireGuard UDP port
  community.general.ufw:
    rule: allow
    port: '41641'
    proto: udp

- name: Allow inbound traffic on Tailscale interface
  community.general.ufw:
    rule: allow
    direction: in
    interface: tailscale0

- name: Enable UFW
  community.general.ufw:
    state: enabled
